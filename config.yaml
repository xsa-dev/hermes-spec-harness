# Hermes Spec Harness profile defaults.
# This file intentionally contains no secrets.
profile:
  display_name: Hermes Spec Harness

model:
  display_name: Hermes Spec Harness
  provider: openai-codex
  default: gpt-5.5
  # No API keys or secrets are shipped; users must configure provider auth locally.

auxiliary:
  compression:
    provider: openai-codex
    model: gpt-5.5
    # Force preflight/context summarization to use the same gpt-5.5 provider
    # instead of auto-routing to OpenRouter or other auxiliary fallbacks.
    timeout: 360
    extra_body: {}

terminal:
  # Set a constrained project cwd in your local profile after installation.
  cwd: null

api:
  # Disabled by default. Enable in the installed profile if exposing an OpenAI-compatible endpoint.
  enabled: false
  host: 127.0.0.1
  port: 0
